<script>
    const extensions = ['.jpg', '.JPG', '.png', '.PNG', '.webp', '.WEBP', '.jpeg', '.JPEG'];

    // Функція рекурсивного перебору зображень
    function loadProjectGallery(container, basePath, num) {
        const formattedIndex = String(num).padStart(3, '0');
        let extIndex = 0;

        function attemptNextExtension() {
            // Якщо перебрали всі розширення і файлу немає — припиняємо пошук
            if (extIndex >= extensions.length) {
                return;
            }

            const currentUrl = `${basePath}/image_${formattedIndex}${extensions[extIndex]}`;
            const img = new Image();

            img.onload = () => {
                img.alt = `Photo ${num}`;
                container.appendChild(img);
                // Картинку знайдено! Переходимо до наступного номера, скидаючи extIndex
                loadProjectGallery(container, basePath, num + 1);
            };

            img.onerror = () => {
                // Картинку з таким розширенням не знайдено, перевіряємо наступне розширення
                extIndex++;
                attemptNextExtension();
            };

            img.src = currentUrl;
        }

        attemptNextExtension();
    }

    document.addEventListener("DOMContentLoaded", async () => {
        // Логіка модального вікна контактів
        const contactsModal = document.getElementById('contacts-modal');
        const openBtn = document.getElementById('open-contacts-btn');
        const closeBtn = document.getElementById('contacts-close');
        const overlay = document.getElementById('contacts-overlay');

        if (openBtn) openBtn.addEventListener('click', (e) => { e.preventDefault(); contactsModal.classList.add('active'); });
        if (closeBtn) closeBtn.addEventListener('click', () => contactsModal.classList.remove('active'));
        if (overlay) overlay.addEventListener('click', () => contactsModal.classList.remove('active'));

        // Отримання параметрів URL
        const urlParams = new URLSearchParams(window.location.search);
        const categoryType = urlParams.get('type');
        const projectId = urlParams.get('id');

        if (!categoryType || !projectId) {
            document.getElementById('project-title').textContent = "Параметри проєкту не вказані";
            return;
        }

        try {
            const response = await fetch('./projects.json');
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            const projects = data[categoryType] || [];
            const currentProject = projects.find(p => p.id === projectId);

            if (currentProject) {
                document.getElementById('project-title').textContent = currentProject.title;
                document.title = `${currentProject.title} — Central Architects`;

                const gallery = document.getElementById('project-gallery');
                gallery.innerHTML = '';
                
                // Запуск завантаження з image_001
                loadProjectGallery(gallery, currentProject.folder, 1);
            } else {
                document.getElementById('project-title').textContent = "Проєкт не знайдено";
            }
        } catch (err) {
            console.error("Помилка завантаження даних проєкту:", err);
            document.getElementById('project-title').textContent = "Помилка завантаження даних";
        }
    });
</script>
