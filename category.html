<script>
    const categoryNames = {
        'interiors': "Інтер'єри",
        'public_interiors': "Громадські інтер'єри",
        'architecture': "Архітектура",
        'public_architecture': "Громадська архітектура"
    };

    const extensions = ['.jpg', '.JPG', '.png', '.PNG', '.webp', '.WEBP', '.jpeg', '.JPEG'];

    function autoLoadImage(imgElement, folderPath, indexNum) {
        const numStr = String(indexNum).padStart(3, '0'); // Формат 001, 002, 003...
        const basePath = `./${folderPath}/image_${numStr}`;
        
        let extIndex = 0;

        const tryNext = () => {
            if (extIndex >= extensions.length) return;

            const testUrl = basePath + extensions[extIndex];
            const tempImg = new Image();
            
            tempImg.onload = () => { imgElement.src = testUrl; };
            tempImg.onerror = () => {
                extIndex++;
                tryNext();
            };
            tempImg.src = testUrl;
        };

        tryNext();
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const catType = urlParams.get('type') || 'interiors';

        document.getElementById('cat-title').textContent = categoryNames[catType] || "Галерея проєктів";

        try {
            const response = await fetch('./projects.json');
            if (!response.ok) throw new Error("Помилка зчитування projects.json");

            const data = await response.json();
            const projects = data[catType] || [];

            const container = document.getElementById('projects-container');

            if (projects.length === 0) {
                container.innerHTML = '<p style="font-size: 18px; color: #777;">У цій категорії поки немає опублікованих проєктів.</p>';
                return;
            }

            projects.forEach(project => {
                const projectBlock = document.createElement('div');
                projectBlock.className = 'project-item';

                let galleryHtml = `<div class="project-gallery">`;
                
                for (let i = 1; i <= project.imagesCount; i++) {
                    galleryHtml += `
                        <div class="gallery-card">
                            <img class="auto-img" data-folder="${project.folder}" data-index="${i}" alt="${project.title}">
                        </div>
                    `;
                }
                galleryHtml += `</div>`;

                projectBlock.innerHTML = `
                    <h3>${project.title}</h3>
                    ${galleryHtml}
                `;

                container.appendChild(projectBlock);
            });

            document.querySelectorAll('img.auto-img').forEach(img => {
                const folder = img.getAttribute('data-folder');
                const index = img.getAttribute('data-index');
                autoLoadImage(img, folder, index);
            });

        } catch (err) {
            console.error("Помилка завантаження проєктів:", err);
        }
    });
</script>
